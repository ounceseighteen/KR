{% extends "base.html" %}
{% block title %}Смена пароля — СИНЕМА{% endblock %}
{% block content %}

<div class="page-header">
  <div class="page-header__left">
    <h1>Смена пароля</h1>
  </div>
  <a href="{{ url_for('profile') }}" class="btn btn--ghost">← Назад</a>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('change_password') }}">
    <div class="form-group">
      <label>Текущий пароль *</label>
      <input class="form-control" type="password" name="старый_пароль"
             placeholder="Введите текущий пароль" required autofocus/>
    </div>
    <div class="form-group">
      <label>Новый пароль *</label>
      <input class="form-control" type="password" name="новый_пароль"
             placeholder="Минимум 6 символов" required/>
    </div>
    <div class="form-group">
      <label>Повторите новый пароль *</label>
      <input class="form-control" type="password" name="новый_пароль2"
             placeholder="Повторите новый пароль" required/>
    </div>
    <div class="form-actions">
      <button class="btn btn--primary" type="submit">Сменить пароль</button>
      <a href="{{ url_for('profile') }}" class="btn btn--ghost">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
