<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Регистрация — СИНЕМА</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
  <style>
    .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .auth-box {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 2.5rem; width: 100%; max-width: 480px;
    }
    .auth-box__brand {
      font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 700;
      color: var(--purple-glow); text-align: center; margin-bottom: .35rem;
    }
    .auth-box__sub { text-align: center; color: var(--text-muted); font-size: .85rem; margin-bottom: 2rem; }
    .auth-switch { text-align: center; margin-top: 1.5rem; font-size: .82rem; color: var(--text-muted); }
    .auth-switch a { color: var(--purple-light); text-decoration: none; font-weight: 500; }
    .auth-switch a:hover { color: var(--purple-glow); }
    .hint { font-size: .73rem; color: var(--text-muted); margin-top: .3rem; }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-box__brand">🎬 СИНЕМА</div>
    <div class="auth-box__sub">Создайте аккаунт, чтобы покупать билеты онлайн</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
        <div class="flash flash--{{ cat }}" style="margin-bottom:.75rem;">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-group">
        <label>Полное имя *</label>
        <input class="form-control" name="полное_имя" required autofocus
               placeholder="Иванов Иван Иванович"/>
      </div>
      <div class="form-group">
        <label>Номер телефона *</label>
        <input class="form-control" name="телефон" required
               placeholder="+7-900-000-0000"/>
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input class="form-control" type="email" name="электронная_почта"
               placeholder="email@example.com"/>
        <div class="hint">Необязательно, но можно использовать для входа</div>
      </div>
      <div class="form-group">
        <label>Пароль *</label>
        <input class="form-control" type="password" name="пароль" required
               placeholder="Минимум 6 символов"/>
      </div>
      <div class="form-group">
        <label>Повторите пароль *</label>
        <input class="form-control" type="password" name="пароль2" required
               placeholder="Повторите пароль"/>
      </div>
      <button class="btn btn--primary" type="submit"
              style="width:100%;justify-content:center;margin-top:.5rem;">
        Зарегистрироваться
      </button>
    </form>

    <div class="auth-switch">
      Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a>
    </div>
  </div>
</div>
</body>
</html>
